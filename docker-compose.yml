services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jerome_aiplan
    restart: unless-stopped
    ports:
      - "3018:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - jerome_aiplan
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  jerome_aiplan:
    driver: bridge